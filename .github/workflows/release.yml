name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version and release
    runs-on: ubuntu-latest

    steps:
      - name: Create release PR or GitHub release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: php
          package-name: caydeesoft/payments
